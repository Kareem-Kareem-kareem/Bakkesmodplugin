name: Build BoostHUD Plugin

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore

      - name: Build
        run: msbuild BoostHUD.vcxproj /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: BoostHUD-Plugin
          path: bin\Release\BoostHUD.dll
